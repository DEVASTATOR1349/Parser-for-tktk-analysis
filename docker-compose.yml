version: "3.9"

# Mount your secrets into ./config/:
#   ./config/service_account.json  — Google service account JSON
#   ./config/clients.yaml          — clients config
#
# Server crontab example:
#   0 6 * * *   cd /srv/parser && docker-compose run --rm daily-worker  >> logs/daily.log 2>&1
#   */30 * * * * cd /srv/parser && docker-compose run --rm refresh-worker >> logs/refresh.log 2>&1

services:
  daily-worker:
    build: .
    env_file: .env
    volumes:
      - ./config:/app/config:ro
    command: python workers/project_content_daily_worker.py --once
    restart: "no"

  refresh-worker:
    build: .
    env_file: .env
    volumes:
      - ./config:/app/config:ro
    command: python workers/video_refresh_worker.py --once --max-rows 50
    restart: "no"
